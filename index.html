<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XPENG G6 Interactive Manual</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <!-- Google Fonts: Prompt for Thai Language -->
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Chosen Palette: XPENG Dark Electric (Deep Grays, Slate, Electric Cyan, Alert Amber) -->
    <!-- Application Structure Plan: The SPA transitions the linear user manual into a "Smart Vehicle Dashboard". Instead of reading page by page, users navigate by feature modules (Overview, Smart Parking, Performance). This task-oriented structure allows users to immediately access the critical operational instructions and safety warnings (like the APA limitations) in bite-sized, interactive chunks, improving retention and ease of use compared to a dense PDF. -->
    <!-- Visualization & Content Choices: 
         1. Intro/OTA Rules -> Text Cards -> Immediate context setting for the user. 
         2. APA (Auto Parking Assist) -> Interactive Tabs/Toggles -> The snippet detailed specific activation methods and warnings. Toggles allow users to explore activation modes without cluttering the screen. Warnings are highlighted dynamically. 
         3. Battery/Range Expectation -> Line Chart (Chart.js) -> EV users need to understand range decay. A dynamic chart visualizes this relationship much better than a static table. 
         - Library: Chart.js for data viz. HTML/Tailwind for interactive cards. 
         - NO SVG/Mermaid used. -->
    <!-- CONFIRMATION: NO SVG graphics used. NO Mermaid JS used. -->

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Prompt', 'sans-serif'],
                    },
                    colors: {
                        xpeng: {
                            dark: '#0B0F19',
                            panel: '#1A202C',
                            border: '#2D3748',
                            cyan: '#00D2FF',
                            cyanHover: '#00A3CC',
                            alert: '#F56565',
                            warning: '#ECC94B'
                        }
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #0B0F19;
            color: #E2E8F0;
        }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #0B0F19; 
        }
        ::-webkit-scrollbar-thumb {
            background: #2D3748; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #4A5568; 
        }

        /* Chart Container Styling - STRICT REQUIREMENTS */
        .chart-container {
            position: relative;
            width: 100%;
            max-width: 800px;
            margin-left: auto;
            margin-right: auto;
            height: 350px;
            max-height: 400px;
            background-color: #1A202C;
            border: 1px solid #2D3748;
            border-radius: 0.5rem;
            padding: 1rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }
        
        @media (min-width: 768px) {
            .chart-container {
                height: 400px;
            }
        }

        /* Utilities */
        .glass-panel {
            background: rgba(26, 32, 44, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(45, 55, 72, 0.8);
        }
        
        .nav-item.active {
            background-color: #2D3748;
            color: #00D2FF;
            border-left: 4px solid #00D2FF;
        }
    </style>
</head>
<body class="flex flex-col h-screen overflow-hidden antialiased">

    <!-- Top Navigation -->
    <header class="glass-panel z-10 px-6 py-4 flex justify-between items-center shrink-0">
        <div class="flex items-center gap-3">
            <span class="text-3xl font-bold text-xpeng-cyan">XPENG</span>
            <span class="text-xl font-light text-gray-300 hidden sm:inline border-l border-gray-600 pl-3">คู่มือการใช้งานแบบอินเทอร์แอคทีฟ G6</span>
        </div>
        <div class="text-sm text-gray-400">
            เวอร์ชันเอกสาร: กรกฎาคม 2024
        </div>
    </header>

    <!-- Main Layout -->
    <div class="flex flex-1 overflow-hidden">
        
        <!-- Sidebar Navigation -->
        <nav class="w-64 glass-panel shrink-0 flex flex-col overflow-y-auto hidden md:flex border-t-0 border-r border-xpeng-border">
            <div class="p-4 text-xs font-semibold text-gray-500 uppercase tracking-wider">เมนูหลัก</div>
            <button onclick="navigate('overview')" id="nav-overview" class="nav-item active flex items-center gap-3 px-6 py-4 text-left hover:bg-xpeng-border transition-colors">
                <span class="text-xl">ℹ️</span>
                <span>ข้อมูลพื้นฐาน & OTA</span>
            </button>
            <button onclick="navigate('parking')" id="nav-parking" class="nav-item flex items-center gap-3 px-6 py-4 text-left hover:bg-xpeng-border transition-colors">
                <span class="text-xl">🅿️</span>
                <span>ระบบช่วยจอดอัตโนมัติ (APA)</span>
            </button>
            <button onclick="navigate('performance')" id="nav-performance" class="nav-item flex items-center gap-3 px-6 py-4 text-left hover:bg-xpeng-border transition-colors">
                <span class="text-xl">🔋</span>
                <span>ประสิทธิภาพแบตเตอรี่</span>
            </button>
        </nav>

        <!-- Mobile Nav (Dropdown) -->
        <div class="md:hidden w-full bg-xpeng-panel p-4 border-b border-xpeng-border shrink-0">
            <select id="mobile-nav" onchange="navigate(this.value)" class="w-full bg-xpeng-dark text-white border border-xpeng-border rounded p-2 outline-none focus:border-xpeng-cyan">
                <option value="overview">ℹ️ ข้อมูลพื้นฐาน & OTA</option>
                <option value="parking">🅿️ ระบบช่วยจอดอัตโนมัติ (APA)</option>
                <option value="performance">🔋 ประสิทธิภาพแบตเตอรี่</option>
            </select>
        </div>

        <!-- Dynamic Content Area -->
        <main id="main-content" class="flex-1 overflow-y-auto p-4 md:p-8 bg-xpeng-dark">
            <!-- Content gets injected here by JavaScript -->
        </main>
    </div>

    <!-- JavaScript Application Logic -->
    <script>
        // --- DATA STORE ---
        const appData = {
            overview: {
                title: "ข้อมูลพื้นฐานและข้อควรระวัง (Introduction & OTA)",
                intro: "ยินดีต้อนรับสู่ XPENG G6 SUV คูเป้ที่มีความฉลาดและฟีเจอร์ล้ำสมัย ส่วนนี้จะสรุปข้อมูลสำคัญก่อนเริ่มใช้งานรถยนต์ของคุณ รวมถึงนโยบายการอัปเดตระบบปฏิบัติการผ่านทางอากาศ (OTA) ซึ่งเป็นหัวใจสำคัญของรถยนต์พลังงานไฟฟ้าอัจฉริยะ",
                cards: [
                    {
                        icon: "📖",
                        title: "จุดประสงค์ของคู่มือ",
                        text: "กรุณาอ่านเพื่อทำความเข้าใจข้อมูลพื้นฐาน การใช้งาน และข้อควรระวัง หากมีคำถามกรุณาติดต่อศูนย์บริการ XPENG"
                    },
                    {
                        icon: "🔄",
                        title: "การอัปเกรดผ่านทางอากาศ (OTA)",
                        text: "G6 สามารถอัปเกรดระบบไร้สายได้ ฟีเจอร์และการกำหนดค่าอาจมีการอัปเดตเป็นระยะหลังจากการอัปเกรดระยะไกล"
                    },
                    {
                        icon: "⚠️",
                        title: "ข้อควรระวังหลังการอัปเดต",
                        text: "กรุณาทำความคุ้นเคยกับฟังก์ชันล่าสุด เทคนิคการใช้งาน และข้อควรระวัง <strong>ก่อนที่จะใช้งานรถยนต์หลังจากการอัปเกรด</strong> โปรดให้ความสนใจกับคำเตือนเป็นพิเศษ"
                    },
                    {
                        icon: "⚖️",
                        title: "สิทธิ์ของ XPENG",
                        text: "XPENG ขอสงวนสิทธิ์ในการเปลี่ยนแปลง เพิ่มเติม หรือยกเลิกเนื้อหาและข้อกำหนดทางเทคนิค กรุณาเก็บคู่มือนี้ให้ปลอดภัย"
                    }
                ]
            },
            parking: {
                title: "ระบบช่วยจอดอัตโนมัติ (Auto Parking Assist : APA)",
                intro: "ระบบ APA ช่วยให้การจอดรถเป็นเรื่องง่ายขึ้น รองรับการจอดทั้งแนวตั้ง แนวขนาน และแนวเฉียง ส่วนนี้จะอธิบายวิธีการทำงาน การเปิดใช้งาน และข้อจำกัดด้านความปลอดภัยที่คุณต้องทราบอย่างเคร่งครัด",
                definition: "APA สามารถช่วยผู้ขับขี่ในการจอดรถเข้าและออกจากที่จอดรถแนวตั้ง แนวขนาน และแนวเฉียง โดยใช้กรอบที่มีสายหรือไร้สาย",
                activationMethods: [
                    { id: "method-panel", name: "แผงควบคุมส่วนกลาง", icon: "🖥️", desc: "สั่งการผ่านหน้าจอสัมผัสระบบ Infotainment กลางตัวรถโดยตรงเมื่อระบบตรวจพบช่องจอด" },
                    { id: "method-phone", name: "รหัสจากโทรศัพท์มือถือ", icon: "📱", desc: "ควบคุมการจอดรถจากภายนอกรถผ่านแอปพลิเคชัน XPENG บนสมาร์ทโฟนของคุณ (ต้องอยู่ในระยะที่กำหนด)" }
                ],
                indicators: [
                    { state: "ไม่พร้อมใช้งาน", color: "text-gray-500", icon: "⚪" },
                    { state: "สามารถเปิดใช้งาน APA ได้", color: "text-blue-400", icon: "🔵" },
                    { state: "เปิดใช้งาน APA แล้ว", color: "text-green-400", icon: "🟢" }
                ],
                warning: "APA เป็นเพียงฟังก์ชันช่วยเหลือผู้ขับขี่เท่านั้น และไม่สามารถจัดการกับสภาพการจราจร สภาพอากาศ และสภาพถนนทั้งหมดได้ ในฐานะผู้ขับขี่รถยนต์คุณมีความรับผิดชอบต่อความปลอดภัยในการขับขี่ กรุณาจับพวงมาลัยไว้ตลอดเวลา สังเกตสภาพถนน และควบคุมรถให้ทันเวลาในกรณีที่เกิดอันตราย อย่าพึ่งพาฟังก์ชันนี้ในการควบคุมรถ มิฉะนั้น อาจเกิดการบาดเจ็บหรือแม้กระทั่งเสียชีวิตได้ (เรดาร์เตือนภัยมีข้อจำกัด)"
            },
            performance: {
                title: "ประสิทธิภาพและการจำลองระยะทาง (Range Visualization)",
                intro: "ทำความเข้าใจความสัมพันธ์ระหว่างความเร็วในการขับขี่กับระยะทางที่คาดว่าจะขับได้ (Estimated Range) ของรถยนต์ XPENG G6 การขับขี่ด้วยความเร็วสูงอย่างต่อเนื่องจะส่งผลต่ออัตราการใช้พลังงาน แผนภูมินี้ช่วยให้คุณวางแผนการเดินทางได้อย่างมีประสิทธิภาพ",
                chartData: {
                    labels: ['60 km/h', '80 km/h', '100 km/h', '120 km/h', '140 km/h'],
                    datasets: [{
                        label: 'ระยะทางที่คาดการณ์ (กม.)',
                        data: [580, 520, 450, 360, 280],
                        borderColor: '#00D2FF',
                        backgroundColor: 'rgba(0, 210, 255, 0.1)',
                        borderWidth: 3,
                        pointBackgroundColor: '#1A202C',
                        pointBorderColor: '#00D2FF',
                        pointBorderWidth: 2,
                        pointRadius: 5,
                        fill: true,
                        tension: 0.4
                    }]
                }
            }
        };

        // Global Chart Instance
        let currentChart = null;

        // --- RENDER FUNCTIONS ---

        function renderOverview() {
            const data = appData.overview;
            let cardsHtml = '';
            
            data.cards.forEach(card => {
                cardsHtml += `
                    <div class="bg-xpeng-panel p-6 rounded-xl border border-xpeng-border hover:border-xpeng-cyan transition-colors duration-300">
                        <div class="text-3xl mb-4">${card.icon}</div>
                        <h3 class="text-lg font-semibold text-white mb-2">${card.title}</h3>
                        <p class="text-gray-400 text-sm leading-relaxed">${card.text}</p>
                    </div>
                `;
            });

            return `
                <div class="max-w-5xl mx-auto animation-fade-in">
                    <h2 class="text-2xl md:text-3xl font-bold text-white mb-4 border-l-4 border-xpeng-cyan pl-4">${data.title}</h2>
                    <p class="text-gray-300 mb-8 text-lg leading-relaxed bg-xpeng-panel p-4 rounded-lg border-l-2 border-gray-600">${data.intro}</p>
                    
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        ${cardsHtml}
                    </div>
                </div>
            `;
        }

        function renderParking() {
            const data = appData.parking;
            
            let methodsHtml = '';
            data.activationMethods.forEach((method, index) => {
                methodsHtml += `
                    <button onclick="toggleApaMethod(${index})" class="flex-1 bg-xpeng-panel border border-xpeng-border rounded-lg p-4 text-left hover:bg-gray-800 transition-colors focus:outline-none focus:ring-2 focus:ring-xpeng-cyan">
                        <div class="flex items-center gap-3 mb-2">
                            <span class="text-2xl">${method.icon}</span>
                            <span class="font-semibold text-white">${method.name}</span>
                        </div>
                        <p id="apa-desc-${index}" class="text-gray-400 text-sm hidden mt-3 pt-3 border-t border-gray-700">${method.desc}</p>
                    </button>
                `;
            });

            let indicatorsHtml = '';
            data.indicators.forEach(ind => {
                indicatorsHtml += `
                    <div class="flex items-center gap-3 p-3 bg-xpeng-dark rounded border border-xpeng-border">
                        <span class="${ind.color} text-xl">${ind.icon}</span>
                        <span class="text-gray-300 text-sm">${ind.state}</span>
                    </div>
                `;
            });

            return `
                <div class="max-w-5xl mx-auto animation-fade-in">
                    <h2 class="text-2xl md:text-3xl font-bold text-white mb-4 border-l-4 border-xpeng-cyan pl-4">${data.title}</h2>
                    <p class="text-gray-300 mb-8 text-lg leading-relaxed bg-xpeng-panel p-4 rounded-lg border-l-2 border-gray-600">${data.intro}</p>
                    
                    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                        
                        <div class="lg:col-span-2 space-y-6">
                            <div class="bg-xpeng-panel p-6 rounded-xl border border-xpeng-border">
                                <h3 class="text-xl font-semibold text-white mb-4 flex items-center gap-2"><span class="text-2xl">🚙</span> การทำงานของระบบ</h3>
                                <p class="text-gray-300 leading-relaxed mb-6">${data.definition}</p>
                                
                                <h4 class="text-sm font-semibold text-gray-500 uppercase tracking-wider mb-3">วิธีการเปิดใช้งาน (คลิกเพื่อดูรายละเอียด)</h4>
                                <div class="flex flex-col sm:flex-row gap-4">
                                    ${methodsHtml}
                                </div>
                            </div>

                            <div class="bg-red-900/20 p-6 rounded-xl border border-red-500/30 relative overflow-hidden">
                                <div class="absolute top-0 left-0 w-1 h-full bg-red-500"></div>
                                <h3 class="text-xl font-bold text-red-400 mb-3 flex items-center gap-2"><span>⚠️</span> คำเตือนความปลอดภัยสูงสุด</h3>
                                <p class="text-gray-300 text-sm leading-relaxed">${data.warning}</p>
                            </div>
                        </div>

                        <div class="space-y-6">
                            <div class="bg-xpeng-panel p-6 rounded-xl border border-xpeng-border h-full">
                                <h3 class="text-lg font-semibold text-white mb-4">สถานะไฟแสดงการทำงาน (แผงหน้าปัด)</h3>
                                <div class="space-y-3">
                                    ${indicatorsHtml}
                                </div>
                            </div>
                        </div>

                    </div>
                </div>
            `;
        }

        function renderPerformance() {
            const data = appData.performance;
            
            return `
                <div class="max-w-5xl mx-auto animation-fade-in">
                    <h2 class="text-2xl md:text-3xl font-bold text-white mb-4 border-l-4 border-xpeng-cyan pl-4">${data.title}</h2>
                    <p class="text-gray-300 mb-8 text-lg leading-relaxed bg-xpeng-panel p-4 rounded-lg border-l-2 border-gray-600">${data.intro}</p>
                    
                    <!-- REQUIRED CHART CONTAINER STYLING APPLIED HERE -->
                    <div class="chart-container">
                        <canvas id="rangeChart"></canvas>
                    </div>

                    <div class="mt-8 bg-xpeng-panel p-4 rounded-lg border border-xpeng-border max-w-3xl mx-auto text-center">
                        <p class="text-sm text-gray-400">💡 <strong>ข้อสังเกต:</strong> ข้อมูลจำลองเพื่อการสาธิตการทำงานของแบตเตอรี่ ระยะทางจริงขึ้นอยู่กับสภาพถนน อุณหภูมิ และสไตล์การขับขี่</p>
                    </div>
                </div>
            `;
        }

        // --- INTERACTION LOGIC ---

        // Expose function for the APA toggle interaction
        window.toggleApaMethod = function(index) {
            const descEl = document.getElementById(`apa-desc-${index}`);
            if (descEl.classList.contains('hidden')) {
                descEl.classList.remove('hidden');
                descEl.classList.add('block', 'animate-pulse'); // brief highlight
                setTimeout(() => descEl.classList.remove('animate-pulse'), 500);
            } else {
                descEl.classList.add('hidden');
                descEl.classList.remove('block');
            }
        };

        function initChart() {
            const ctx = document.getElementById('rangeChart');
            if (!ctx) return;

            // Destroy previous instance if exists to prevent Canvas errors
            if (currentChart) {
                currentChart.destroy();
            }

            Chart.defaults.color = '#A0AEC0';
            Chart.defaults.font.family = "'Prompt', sans-serif";

            currentChart = new Chart(ctx, {
                type: 'line',
                data: appData.performance.chartData,
                options: {
                    responsive: true,
                    maintainAspectRatio: false, // MANDATORY for proper container fitting
                    plugins: {
                        legend: {
                            display: false
                        },
                        tooltip: {
                            backgroundColor: 'rgba(26, 32, 44, 0.9)',
                            titleFont: { size: 14, family: "'Prompt', sans-serif" },
                            bodyFont: { size: 14, family: "'Prompt', sans-serif" },
                            padding: 12,
                            borderColor: '#2D3748',
                            borderWidth: 1,
                            callbacks: {
                                label: function(context) {
                                    return ` วิ่งได้ประมาณ: ${context.parsed.y} กม.`;
                                }
                            }
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            grid: {
                                color: '#2D3748',
                                drawBorder: false
                            },
                            title: {
                                display: true,
                                text: 'ระยะทาง (กิโลเมตร)',
                                color: '#718096'
                            }
                        },
                        x: {
                            grid: {
                                display: false
                            },
                            title: {
                                display: true,
                                text: 'ความเร็วเฉลี่ย',
                                color: '#718096'
                            }
                        }
                    },
                    interaction: {
                        intersect: false,
                        mode: 'index',
                    },
                }
            });
        }

        // Navigation Controller
        window.navigate = function(section) {
            // Update Active Menu States
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            const desktopNav = document.getElementById(`nav-${section}`);
            if (desktopNav) desktopNav.classList.add('active');
            
            // Sync mobile select
            const mobileNav = document.getElementById('mobile-nav');
            if(mobileNav.value !== section) mobileNav.value = section;

            // Render Content
            const mainContent = document.getElementById('main-content');
            
            // Add slight fade out effect before changing
            mainContent.style.opacity = '0.5';
            
            setTimeout(() => {
                if (section === 'overview') {
                    mainContent.innerHTML = renderOverview();
                } else if (section === 'parking') {
                    mainContent.innerHTML = renderParking();
                } else if (section === 'performance') {
                    mainContent.innerHTML = renderPerformance();
                    // Need to wait for DOM insertion before initializing Canvas
                    setTimeout(initChart, 50); 
                }
                
                // Fade back in
                mainContent.style.opacity = '1';
            }, 150);
        };

        // Initialize App
        document.addEventListener('DOMContentLoaded', () => {
            // Add simple fade animation CSS dynamically
            const style = document.createElement('style');
            style.textContent = `
                .animation-fade-in {
                    animation: fadeIn 0.4s ease-out forwards;
                }
                @keyframes fadeIn {
                    from { opacity: 0; transform: translateY(10px); }
                    to { opacity: 1; transform: translateY(0); }
                }
                #main-content {
                    transition: opacity 0.15s ease-in-out;
                }
            `;
            document.head.appendChild(style);

            // Load default route
            navigate('overview');
        });

    </script>
</body>
